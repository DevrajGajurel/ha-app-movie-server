name: Movie Server
version: "1.2.1"
slug: movie_server
description: Scrape movie listings, enrich with TMDB, and download to PlexMedia
url: https://github.com/DevrajGajurel/ha-app-movie-server
startup: application
boot: auto
init: false
ingress: true
ingress_port: 3001
panel_icon: mdi:movie-open-play
panel_title: Movie Server
webui: http://[HOST]:[PORT:3001]/
arch:
  - aarch64
  - amd64
  - armv7
ports:
  3001/tcp: 3001
ports_description:
  3001/tcp: Movie Server dashboard
map:
  - media:rw
  - config:rw
options:
  main_url: "https://filmyfly.luxe/"
  max_pages: 5
  tmdb_api_key: ""
  download_dir: "/media/Plex_Media"
schema:
  main_url: url
  max_pages: int(1,100)
  tmdb_api_key: password
  download_dir: str
  emby_url: url?
  emby_api_key: password?
  initial_pages: int(1,20)?
  hd_keywords: str?
  k4_keywords: str?
  emby_path_prefix: str?

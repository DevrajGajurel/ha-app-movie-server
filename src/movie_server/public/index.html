<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Movie Server</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #6c8cff;
      --accent-hover: #8aa4ff;
      --danger: #ff6b6b;
      --success: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

    .filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0;
    }

    .filters[hidden] { display: none; }

    .filters-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }

    .filters-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .filters-row input,
    .filters-row select,
    .source-config-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.45rem 0.65rem;
      font-size: 0.8rem;
    }

    .filters-row input { flex: 1; min-width: 160px; }
    .filters-row select { min-width: 130px; }

    #refresh {
      margin-left: auto;
      flex-shrink: 0;
    }

    .filters-row input:focus,
    .filters-row select:focus,
    .source-config-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .chip {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .chip:hover,
    .chip.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108, 140, 255, 0.1);
    }

    .filter-count {
      margin-top: 0.65rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .source-config-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .source-config-panel {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.25rem 0;
    }

    .source-config-panel[hidden] {
      display: none;
    }

    .source-config-row label {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .source-config-row input {
      min-width: 0;
    }

    .empty-actions {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .empty-hint {
      max-width: 520px;
      margin: 0.5rem auto 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .selector-debug {
      margin: 0.75rem 0;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      font-size: 0.78rem;
      text-align: left;
    }

    .selector-debug code {
      display: block;
      margin-top: 0.35rem;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .genre-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .genre-tag {
      font-size: 0.65rem;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      background: rgba(108, 140, 255, 0.12);
      color: var(--accent);
    }

    .state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .state.error { color: var(--danger); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .poster {
      aspect-ratio: 2 / 3;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      padding: 0.5rem;
      position: relative;
    }

    .quality-badges {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      align-items: flex-end;
    }

    .quality-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .quality-badge.hd {
      background: rgba(74, 222, 128, 0.9);
      color: #0f1117;
    }

    .quality-badge.k4 {
      background: rgba(251, 191, 36, 0.95);
      color: #0f1117;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 0.85rem; }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .scraped-title {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .rating {
      color: #fbbf24;
      font-weight: 600;
    }

    .type-badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--border);
      color: var(--muted);
    }

    .type-badge.tv {
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.12);
    }

    .overview {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.65rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .card a {
      color: var(--accent);
      font-size: 0.75rem;
      text-decoration: none;
      word-break: break-all;
    }

    .card a:hover { text-decoration: underline; }

    .empty { color: var(--muted); font-size: 0.9rem; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }

    footer a { color: var(--accent); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 100;
    }

    .modal-backdrop[hidden] { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      width: min(100%, 480px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .modal h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }

    .modal p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .modal p code {
      color: var(--text);
      font-size: 0.8rem;
    }

    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .modal input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--border);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover:not(:disabled) {
      background: #ff8585;
    }

    .download-link {
      cursor: pointer;
    }
    .download-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-height: 360px;
      overflow-y: auto;
    }

    .download-option {
      display: block;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color 0.15s;
      text-align: left;
      cursor: pointer;
    }

    button.download-option {
      font-family: inherit;
    }

    .download-back {
      margin-bottom: 0.75rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
    }

    .download-option:hover {
      border-color: var(--accent);
      text-decoration: none;
    }

    .download-option span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      margin-top: 0.25rem;
      word-break: break-all;
    }

    button.download-option:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .download-option.saved {
      border-color: var(--success);
    }

    .download-option.failed {
      border-color: var(--danger);
    }

    .download-save-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .card-download-status {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .card-download-status .download-active-label {
      display: block;
      margin-bottom: 0.3rem;
      color: var(--text);
    }

    .download-progress {
      height: 6px;
      background: var(--bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .download-progress.thin {
      height: 4px;
      margin-top: 0.25rem;
    }

    .download-progress span {
      display: block;
      height: 100%;
      width: var(--progress, 0%);
      background: var(--accent);
      transition: width 0.2s;
    }

    .download-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 999px;
      border: none;
      cursor: default;
      flex-shrink: 0;
    }

    .download-badge svg {
      width: 1rem;
      height: 1rem;
      display: block;
    }

    .download-badge.downloaded {
      position: absolute;
      bottom: 0.5rem;
      left: 0.5rem;
      background: rgba(74, 222, 128, 0.95);
      color: #0f1117;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .download-badge.failed {
      background: rgba(255, 107, 107, 0.15);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.4);
    }

    .download-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 12rem;
      max-width: 18rem;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.68rem;
      line-height: 1.35;
      word-break: break-all;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.15s, visibility 0.15s;
      z-index: 5;
    }

    .download-tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--border);
    }

    .download-badge:hover .download-tooltip,
    .download-badge:focus .download-tooltip,
    .download-badge:focus-within .download-tooltip {
      opacity: 1;
      visibility: visible;
    }

    .card-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(108, 140, 255, 0.08);
      font-weight: 500;
    }

    .card-action-btn:hover {
      background: rgba(108, 140, 255, 0.16);
      text-decoration: none;
    }

    @media (max-width: 768px) {
      main,
      .filters,
      .source-config-panel {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }

      main {
        padding-top: 0.75rem;
        padding-bottom: 1.25rem;
      }

      .filters {
        padding-top: 0.75rem;
      }

      .filters-panel {
        padding: 0.75rem;
        border-radius: 10px;
      }

      .filters-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }

      .filters-row input[type="search"] {
        grid-column: 1 / -1;
        min-width: 0;
        width: 100%;
        font-size: 1rem;
        padding: 0.65rem 0.75rem;
      }

      .source-config-row {
        grid-template-columns: 1fr;
      }

      .filters-row select {
        min-width: 0;
        width: 100%;
        font-size: 0.9rem;
        padding: 0.6rem 0.5rem;
      }

      #refresh {
        grid-column: 1 / -1;
        margin-left: 0;
        width: 100%;
        min-height: 2.75rem;
        font-size: 0.95rem;
      }

      .filter-chips {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        margin-top: 0.65rem;
        padding-bottom: 0.15rem;
        gap: 0.45rem;
      }

      .filter-chips::-webkit-scrollbar {
        display: none;
      }

      .chip {
        flex-shrink: 0;
        padding: 0.45rem 0.85rem;
        font-size: 0.8rem;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 0.65rem;
      }

      .card {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        border-radius: 10px;
      }

      .card:hover {
        transform: none;
      }

      .poster {
        position: relative;
        width: 7.5rem;
        min-width: 7.5rem;
        aspect-ratio: auto;
        align-self: stretch;
        min-height: 9rem;
      }

      .poster img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .quality-badges {
        top: 0.35rem;
        right: 0.35rem;
        gap: 0.2rem;
      }

      .quality-badge {
        font-size: 0.58rem;
        padding: 0.15rem 0.35rem;
      }

      .download-badge.downloaded {
        bottom: 0.35rem;
        left: 0.35rem;
        width: 1.5rem;
        height: 1.5rem;
      }

      .download-badge.downloaded svg {
        width: 0.85rem;
        height: 0.85rem;
      }

      .card-body {
        flex: 1;
        min-width: 0;
        padding: 0.65rem 0.7rem;
        display: flex;
        flex-direction: column;
      }

      .card h2 {
        font-size: 0.95rem;
        -webkit-line-clamp: 2;
      }

      .scraped-title {
        font-size: 0.7rem;
        -webkit-line-clamp: 2;
      }

      .overview {
        -webkit-line-clamp: 2;
        margin-bottom: 0.5rem;
      }

      .links {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: auto;
      }

      .card a {
        font-size: 0.8rem;
      }

      .card-action-btn {
        flex: 1;
        min-width: calc(50% - 0.25rem);
        text-align: center;
      }

      .modal-backdrop {
        align-items: flex-end;
        padding: 0;
      }

      .modal {
        width: 100%;
        max-height: 92vh;
        border-radius: 16px 16px 0 0;
        padding: 1rem 1rem calc(1rem + env(safe-area-inset-bottom, 0px));
        overflow-y: auto;
      }

      .download-list {
        max-height: 50vh;
      }

      .download-option {
        min-height: 2.75rem;
        padding: 0.85rem;
        font-size: 0.9rem;
      }

      .state {
        padding: 2rem 0.75rem;
      }
    }

    @media (max-width: 380px) {
      .poster {
        width: 6.5rem;
        min-width: 6.5rem;
        min-height: 8rem;
      }

      .links {
        flex-direction: column;
      }

      .card-action-btn {
        width: 100%;
        min-width: 0;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
    }
  </style>
</head>
<body>
  <section class="source-config-panel" id="source-config" hidden>
    <div class="source-config-row">
      <label for="main-url-input">Source URL</label>
      <input id="main-url-input" type="url" placeholder="https://filmyfly.luxe/" />
      <button id="apply-main-url" type="button">Apply</button>
    </div>
  </section>

  <section class="filters" id="filters" hidden>
    <div class="filters-panel">
      <div class="filters-row">
        <input id="search-input" type="search" placeholder="Search titles…" />
        <select id="sort-select" aria-label="Sort by">
          <option value="source-order">Source order</option>
          <option value="release-desc">Newest first</option>
          <option value="release-asc">Oldest first</option>
          <option value="rating-desc">Top rated</option>
          <option value="title-asc">Title A–Z</option>
        </select>
        <select id="type-filter" aria-label="Filter by type">
          <option value="all">All types</option>
          <option value="movie">Movies</option>
          <option value="tv">TV Series</option>
        </select>
        <select id="genre-filter" aria-label="Filter by genre">
          <option value="all">All genres</option>
        </select>
        <select id="year-filter" aria-label="Filter by year">
          <option value="all">All years</option>
          <option value="recent">Recent (2 yrs)</option>
        </select>
        <select id="quality-filter" aria-label="Filter by quality">
          <option value="all">All quality</option>
          <option value="hd">HD</option>
          <option value="k4">4K</option>
        </select>
        <button id="refresh" type="button">Refresh</button>
      </div>
      <div class="filter-chips">
        <button class="chip" type="button" data-preset="recent">Recent releases</button>
        <button class="chip" type="button" data-preset="top-rated">Top rated (7+)</button>
        <button class="chip" type="button" data-preset="movies">Movies only</button>
        <button class="chip" type="button" data-preset="tv">TV only</button>
        <button class="chip" type="button" data-preset="hd">HD only</button>
        <button class="chip" type="button" data-preset="k4">4K only</button>
        <button class="chip" type="button" data-preset="reset">Reset filters</button>
      </div>
      <p class="filter-count" id="filter-count"></p>
    </div>
  </section>

  <main>
    <div id="content" class="state"></div>
  </main>

  <footer id="footer" hidden>
    Metadata from <a href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">TMDB</a>
  </footer>

  <div class="modal-backdrop" id="download-modal" hidden>
    <div class="modal" role="dialog" aria-labelledby="download-modal-title">
      <h2 id="download-modal-title">Download options</h2>
      <div id="download-modal-content" class="download-state">Loading…</div>
      <div class="modal-actions">
        <button class="btn-secondary" id="download-modal-close" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const content = document.getElementById("content");
    const refreshBtn = document.getElementById("refresh");
    const footer = document.getElementById("footer");
    const filtersEl = document.getElementById("filters");
    const sourceConfigEl = document.getElementById("source-config");
    const mainUrlInput = document.getElementById("main-url-input");
    const applyMainUrlBtn = document.getElementById("apply-main-url");
    let allMovies = [];
    let nextSourceOrder = 0;
    let tmdbEnabledFlag = false;
    let loadGeneration = 0;
    const activePresets = new Set();
    let loadedThroughPage = 0;
    let totalMaxPages = 1;
    let initialPagesCount = 2;

    const searchInput = document.getElementById("search-input");
    const sortSelect = document.getElementById("sort-select");
    const typeFilter = document.getElementById("type-filter");
    const genreFilter = document.getElementById("genre-filter");
    const yearFilter = document.getElementById("year-filter");
    const qualityFilter = document.getElementById("quality-filter");
    const filterCountEl = document.getElementById("filter-count");
    const downloadModal = document.getElementById("download-modal");
    const downloadModalTitle = document.getElementById("download-modal-title");
    const downloadModalContent = document.getElementById("download-modal-content");
    let downloadModalState = { title: "", options: [], movieTitle: "", tmdbId: null };
    const jobPollers = new Map();
    let downloadJobs = [];
    let downloadJobsPoller = null;
    let downloadedTmdbIds = new Set();
    let downloadedTitles = new Set();

    function apiUrl(path) {
      const base = window.MOVIE_SERVER_API_BASE || "";
      return `${base}api/${path.replace(/^\//, "")}`;
    }

    function normalizeTitle(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/\(tmdb-\d+\)/g, "")
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    async function refreshDownloadLibrary() {
      try {
        const res = await fetch(apiUrl("downloads/library"));
        const data = await res.json();
        if (!res.ok) return;
        downloadedTmdbIds = new Set((data.tmdbIds || []).map(String));
        downloadedTitles = new Set(data.titles || []);
      } catch {
        // Ignore transient failures; downloads still work.
      }
    }

    function isAlreadyDownloaded(movie) {
      const t = movie?.tmdb;
      if (t?.tmdbId && downloadedTmdbIds.has(String(t.tmdbId))) return true;
      const title = t?.tmdbTitle || movie?.title || "";
      const norm = normalizeTitle(title);
      return norm ? downloadedTitles.has(norm) : false;
    }

    async function fetchPageRange(from, to, { refresh = false } = {}) {
      const params = new URLSearchParams({ from: String(from), to: String(to) });
      if (refresh) params.set("refresh", "1");
      const res = await fetch(apiUrl(`movies?${params}`));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    }

    function mergeMovies(incoming) {
      const seen = new Set(allMovies.map((movie) => movie.link));
      for (const movie of incoming) {
        if (!seen.has(movie.link)) {
          seen.add(movie.link);
          allMovies.push({ ...movie, sourceOrder: nextSourceOrder++ });
        }
      }
    }

    async function loadRemainingPages(gen, fromPage, toPage, { refresh = false } = {}) {
      for (let page = fromPage; page <= toPage; page++) {
        if (gen !== loadGeneration) return;

        try {
          const data = await fetchPageRange(page, page, { refresh });
          if (gen !== loadGeneration) return;

          mergeMovies(data.movies || []);
          loadedThroughPage = page;
          tmdbEnabledFlag = data.tmdbEnabled;
          filtersEl.hidden = allMovies.length === 0;
          populateFilterOptions(allMovies);
          applyFiltersAndRender();
        } catch (err) {
          console.error(err);
        }
      }
    }

    function getDisplayTitle(movie) {
      return movie.tmdb?.tmdbTitle || movie.title || "Untitled";
    }

    function getReleaseTime(movie) {
      if (movie.tmdb?.releaseDate) return new Date(movie.tmdb.releaseDate).getTime();
      if (movie.tmdb?.year) return new Date(`${movie.tmdb.year}-01-01`).getTime();
      return 0;
    }

    function populateFilterOptions(movies) {
      const genres = new Set();
      const years = new Set();

      for (const movie of movies) {
        for (const genre of movie.tmdb?.genres || []) genres.add(genre);
        if (movie.tmdb?.year) years.add(movie.tmdb.year);
      }

      const currentGenre = genreFilter.value;
      genreFilter.innerHTML = '<option value="all">All genres</option>';
      [...genres].sort().forEach((genre) => {
        const opt = document.createElement("option");
        opt.value = genre;
        opt.textContent = genre;
        genreFilter.appendChild(opt);
      });
      if ([...genreFilter.options].some((o) => o.value === currentGenre)) {
        genreFilter.value = currentGenre;
      }

      const currentYear = yearFilter.value;
      yearFilter.innerHTML = `
        <option value="all">All years</option>
        <option value="recent">Recent (2 yrs)</option>
      `;
      [...years].sort((a, b) => b - a).forEach((year) => {
        const opt = document.createElement("option");
        opt.value = year;
        opt.textContent = year;
        yearFilter.appendChild(opt);
      });
      if ([...yearFilter.options].some((o) => o.value === currentYear)) {
        yearFilter.value = currentYear;
      }
    }

    function applyFiltersAndRender() {
      let list = [...allMovies];
      const search = searchInput.value.trim().toLowerCase();
      const type = typeFilter.value;
      const genre = genreFilter.value;
      const year = yearFilter.value;
      const quality = qualityFilter.value;
      const sort = sortSelect.value;

      if (search) {
        list = list.filter((m) => getDisplayTitle(m).toLowerCase().includes(search));
      }

      if (type !== "all") {
        list = list.filter((m) => m.tmdb?.type === type);
      }

      if (genre !== "all") {
        list = list.filter((m) => m.tmdb?.genres?.includes(genre));
      }

      if (year === "recent") {
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 2);
        list = list.filter((m) => {
          const time = getReleaseTime(m);
          return time && time >= cutoff.getTime();
        });
      } else if (year !== "all") {
        list = list.filter((m) => m.tmdb?.year === year);
      }

      if (quality === "hd") {
        list = list.filter((m) => m.quality?.hd);
      } else if (quality === "k4") {
        list = list.filter((m) => m.quality?.k4);
      }

      if (activePresets.has("recent")) {
        const cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 2);
        list = list.filter((m) => {
          const time = getReleaseTime(m);
          return time && time >= cutoff.getTime();
        });
      }

      if (activePresets.has("top-rated")) {
        list = list.filter((m) => (m.tmdb?.rating || 0) >= 7);
      }

      if (activePresets.has("movies")) {
        list = list.filter((m) => m.tmdb?.type === "movie");
      }

      if (activePresets.has("tv")) {
        list = list.filter((m) => m.tmdb?.type === "tv");
      }

      if (activePresets.has("hd")) {
        list = list.filter((m) => m.quality?.hd);
      }

      if (activePresets.has("k4")) {
        list = list.filter((m) => m.quality?.k4);
      }

      list.sort((a, b) => {
        if (sort === "source-order") return (a.sourceOrder ?? 0) - (b.sourceOrder ?? 0);
        if (sort === "release-desc") return getReleaseTime(b) - getReleaseTime(a);
        if (sort === "release-asc") return getReleaseTime(a) - getReleaseTime(b);
        if (sort === "rating-desc") return (b.tmdb?.rating || 0) - (a.tmdb?.rating || 0);
        return getDisplayTitle(a).localeCompare(getDisplayTitle(b));
      });

      filterCountEl.textContent = `Showing ${list.length} of ${allMovies.length}`;
      if (list.length === 0 && search && allMovies.length > 0) {
        if (loadedThroughPage < totalMaxPages) {
          filterCountEl.textContent = `No matches yet in ${allMovies.length} loaded · pages ${loadedThroughPage + 1}-${totalMaxPages} loading…`;
          content.className = "state empty";
          content.innerHTML = `
            <p class="empty-hint">
              No results for <strong>${escapeHtml(searchInput.value.trim())}</strong> in loaded pages so far.
              Still fetching pages ${loadedThroughPage + 1}-${totalMaxPages} in the background…
            </p>`;
        } else {
          renderEmptySearch(searchInput.value.trim());
        }
      } else {
        renderMovies(list, tmdbEnabledFlag);
      }

      syncChipActiveStates();
    }

    function syncChipActiveStates() {
      document.querySelectorAll(".chip[data-preset]").forEach((chip) => {
        const preset = chip.dataset.preset;
        if (preset === "reset") return;
        const active = activePresets.has(preset);
        chip.classList.toggle("active", active);
        chip.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function resetFilters() {
      searchInput.value = "";
      sortSelect.value = "source-order";
      typeFilter.value = "all";
      genreFilter.value = "all";
      yearFilter.value = "all";
      qualityFilter.value = "all";
      activePresets.clear();
      syncChipActiveStates();
      applyFiltersAndRender();
    }

    function togglePreset(preset) {
      if (preset === "reset") {
        resetFilters();
        return;
      }

      if (activePresets.has(preset)) {
        activePresets.delete(preset);
      } else {
        if (preset === "movies") activePresets.delete("tv");
        if (preset === "tv") activePresets.delete("movies");
        activePresets.add(preset);
        if (preset === "recent") sortSelect.value = "release-desc";
        if (preset === "top-rated") sortSelect.value = "rating-desc";
      }

      syncChipActiveStates();
      applyFiltersAndRender();
    }
    function renderEmptySearch(searchTerm) {
      const canLoadMore = loadedThroughPage < totalMaxPages;
      const pagesHint = canLoadMore
        ? "Load more pages to search a wider listing."
        : "Increase max_pages in the Home Assistant add-on configuration to fetch more listings.";

      content.className = "state empty";
      content.innerHTML = `
        <div>No results found for <strong>${escapeHtml(searchTerm)}</strong>.</div>
        <p class="empty-hint">
          Searched ${loadedThroughPage} loaded page${loadedThroughPage === 1 ? "" : "s"}.
          ${pagesHint}
        </p>
        <div class="empty-actions">
          <button id="search-deeper" type="button" ${canLoadMore ? "" : "disabled"}>
            Load more pages
          </button>
          <button class="btn-secondary" id="clear-search" type="button">Clear search</button>
        </div>
      `;

      document.getElementById("search-deeper")?.addEventListener("click", async () => {
        const btn = document.getElementById("search-deeper");
        btn.disabled = true;
        btn.textContent = "Loading…";
        const gen = loadGeneration;
        const from = loadedThroughPage + 1;
        const to = Math.min(loadedThroughPage + 3, totalMaxPages);
        await loadRemainingPages(gen, from, to);
        applyFiltersAndRender();
      });

      document.getElementById("clear-search")?.addEventListener("click", () => {
        searchInput.value = "";
        applyFiltersAndRender();
      });
    }

    function renderMovies(movies, tmdbEnabled) {
      footer.hidden = !tmdbEnabled;

      if (!movies.length) {
        content.className = "state empty";
        content.textContent = "No movies found. Check the add-on source URL configuration.";
        return;
      }

      content.className = "grid";
      content.innerHTML = movies.map((m) => {
        const t = m.tmdb;
        const displayTitle = t?.tmdbTitle || m.title || "Untitled";
        const poster = t?.poster
          ? `<img src="${escapeAttr(t.poster)}" alt="${escapeAttr(displayTitle)}" loading="lazy" />`
          : "No poster";

        const qualityBadges = `
          <div class="quality-badges">
            ${m.quality?.k4 ? '<span class="quality-badge k4">4K</span>' : ""}
            ${m.quality?.hd ? '<span class="quality-badge hd">HD</span>' : ""}
          </div>`;

        return `
        <article class="card">
          <div class="poster">${poster}${qualityBadges}${renderDownloadedBadge(m, displayTitle)}</div>
          <div class="card-body">
            <h2>${escapeHtml(displayTitle)}</h2>
            ${m.title && m.title !== displayTitle ? `<div class="scraped-title">${escapeHtml(m.title)}</div>` : ""}
            ${t ? `
              <div class="meta-row">
                <span class="type-badge${t.type === "tv" ? " tv" : ""}">${t.type === "tv" ? "TV Series" : "Movie"}</span>
                ${t.year ? `<span>${escapeHtml(t.year)}</span>` : ""}
                ${t.rating ? `<span class="rating">★ ${t.rating}</span>` : ""}
              </div>
              ${t.genres?.length ? `<div class="genre-tags">${t.genres.slice(0, 3).map((g) => `<span class="genre-tag">${escapeHtml(g)}</span>`).join("")}</div>` : ""}
              ${t.overview ? `<p class="overview">${escapeHtml(t.overview)}</p>` : ""}
            ` : (tmdbEnabled ? `<p class="overview">No TMDB match</p>` : "")}
            <div class="links">
              <a href="#" class="download-link card-action-btn" data-download-link="${escapeAttr(m.link)}" data-download-title="${escapeAttr(displayTitle)}" data-tmdb-id="${escapeAttr(t?.tmdbId ? String(t.tmdbId) : "")}">Download</a>
              ${t?.tmdbUrl ? `<a class="card-action-btn" href="${escapeAttr(t.tmdbUrl)}" target="_blank" rel="noopener noreferrer">TMDB</a>` : ""}
            </div>
            ${renderCardDownloadStatus(displayTitle)}
          </div>
        </article>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function closeDownloadModal() {
      downloadModal.hidden = true;
      downloadModalState = { title: "", options: [], movieTitle: "", tmdbId: null };
      for (const timer of jobPollers.values()) clearInterval(timer);
      jobPollers.clear();
    }

    function formatJobStatus(job) {
      if (job.status === "queued") return "Queued…";
      if (job.status === "downloading") {
        if (job.totalBytes > 0) {
          const pct = Math.min(100, Math.round((job.receivedBytes / job.totalBytes) * 100));
          return `Downloading… ${pct}%`;
        }
        return "Downloading…";
      }
      if (job.status === "completed") return "Saved";
      if (job.status === "failed") return `Failed: ${job.error}`;
      return job.status;
    }

    function jobProgress(job) {
      if (!job.totalBytes) return 0;
      return Math.min(100, Math.round((job.receivedBytes / job.totalBytes) * 100));
    }

    function latestJobForMovie(title) {
      if (!title) return null;
      return downloadJobs.find((job) => job.movieTitle === title) || null;
    }

    function renderDownloadedBadge(movie, title) {
      const job = latestJobForMovie(title);
      const jobDone = job && job.status === "completed";
      const libraryDone = isAlreadyDownloaded(movie);
      if (!jobDone && !libraryDone) return "";

      const tip = (jobDone && job.filePath) || "Already downloaded";
      return `
        <span class="download-badge downloaded" tabindex="0" aria-label="Downloaded" title="${escapeAttr(tip)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span class="download-tooltip">${escapeHtml(tip)}</span>
        </span>
      `;
    }

    function renderCardDownloadStatus(title) {
      const job = latestJobForMovie(title);
      if (!job || job.status === "completed") return "";

      const progress = jobProgress(job);

      if (job.status === "failed") {
        const tip = job.error || "Download failed";
        return `
          <div class="card-download-status">
            <span class="download-badge failed" tabindex="0" aria-label="Download failed">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 9v4"/>
                <path d="M12 17h.01"/>
                <circle cx="12" cy="12" r="9"/>
              </svg>
              <span class="download-tooltip">${escapeHtml(tip)}</span>
            </span>
          </div>
        `;
      }

      return `
        <div class="card-download-status">
          <span class="download-active-label">${escapeHtml(formatJobStatus(job))}</span>
          <div class="download-progress thin" style="--progress: ${progress}%"><span></span></div>
        </div>
      `;
    }

    async function refreshDownloadJobs({ rerender = true } = {}) {
      try {
        const res = await fetch(apiUrl("downloads/jobs"));
        const data = await res.json();
        if (!res.ok) return;
        downloadJobs = data.jobs || [];
        if (rerender) applyFiltersAndRender();
        updateDownloadJobsPoller();
      } catch {
        // Ignore transient polling failures.
      }
    }

    function updateDownloadJobsPoller() {
      const hasActiveJobs = downloadJobs.some((job) => job.status === "queued" || job.status === "downloading");
      if (hasActiveJobs && !downloadJobsPoller) {
        downloadJobsPoller = setInterval(() => refreshDownloadJobs(), 2000);
      } else if (!hasActiveJobs && downloadJobsPoller) {
        clearInterval(downloadJobsPoller);
        downloadJobsPoller = null;
      }
    }

    function startJobPolling(jobId, button, label, onComplete) {
      if (jobPollers.has(jobId)) clearInterval(jobPollers.get(jobId));

      const timer = setInterval(async () => {
        try {
          const res = await fetch(apiUrl("downloads/jobs"));
          const data = await res.json();
          const job = data.jobs?.find((item) => item.id === jobId);
          if (!job) return;

          button.textContent = `${label} — ${formatJobStatus(job)}`;

          if (job.status === "completed") {
            button.classList.add("saved");
            button.disabled = true;
            clearInterval(timer);
            jobPollers.delete(jobId);
            if (typeof onComplete === "function") onComplete();
          } else if (job.status === "failed") {
            button.classList.add("failed");
            button.disabled = false;
            clearInterval(timer);
            jobPollers.delete(jobId);
          } else {
            button.disabled = true;
          }
        } catch {
          // keep polling
        }
      }, 1500);

      jobPollers.set(jobId, timer);
    }

    async function startServerDownload(button) {
      const { url, label, movieTitle, tmdbId } = button.dataset;
      button.disabled = true;
      button.textContent = `${label} — Starting…`;

      const res = await fetch(apiUrl("downloads/save"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, label, movieTitle, tmdbId: tmdbId || null }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);

      button.textContent = `${label} — Queued…`;
      await refreshDownloadJobs();
      startJobPolling(data.job.id, button, label, () => {
        refreshDownloadLibrary().then(() => applyFiltersAndRender());
      });
    }

    function renderQualityOptions(options) {
      return `
        <ul class="download-list">
          ${options.map((option) => `
            <li>
              <button type="button" class="download-option download-picker" data-url="${escapeAttr(option.href)}" data-label="${escapeAttr(option.label)}">
                ${escapeHtml(option.label)}
                <span>${escapeHtml(option.href)}</span>
              </button>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function renderSelectorDebug(selectors) {
      if (!selectors?.length) return "";

      return `
        <div class="selector-debug">
          <div>Selectors tried:</div>
          ${selectors.map((item) => `
            <code>${escapeHtml(item.selector)} → ${Number(item.matches || 0)} match${Number(item.matches || 0) === 1 ? "" : "es"}</code>
          `).join("")}
        </div>
      `;
    }

    function renderDirectOptions(options, parentLabel, movieTitle, tmdbId) {
      return `
        <button type="button" class="btn-secondary download-back">← Back</button>
        ${parentLabel ? `<p class="empty-hint">${escapeHtml(parentLabel)}</p>` : ""}
        <p class="download-save-hint">Click to download to PlexMedia on the server (background download).</p>
        <ul class="download-list">
          ${options.map((option) => `
            <li>
              <button
                type="button"
                class="download-option server-download"
                data-url="${escapeAttr(option.href)}"
                data-label="${escapeAttr(option.label)}"
                data-movie-title="${escapeAttr(movieTitle || "")}"
                data-tmdb-id="${escapeAttr(tmdbId ? String(tmdbId) : "")}"
              >
                ${escapeHtml(option.label)}
              </button>
            </li>
          `).join("")}
        </ul>
      `;
    }

    async function loadDirectDownloads(pageUrl, parentLabel) {
      downloadModalContent.className = "download-state";
      downloadModalContent.textContent = "Loading direct download links…";

      const res = await fetch(apiUrl(`downloads?url=${encodeURIComponent(pageUrl)}&type=direct`));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);

      if (!data.options?.length) {
        downloadModalContent.className = "download-state";
        downloadModalContent.innerHTML = `
          <button type="button" class="btn-secondary download-back">← Back</button>
          <p>No direct download links found.</p>
          ${renderSelectorDebug(data.selectors)}
          <a class="download-option" href="${escapeAttr(pageUrl)}" target="_blank" rel="noopener noreferrer">Open source page</a>
        `;
        return;
      }

      downloadModalContent.innerHTML = renderDirectOptions(
        data.options,
        parentLabel,
        downloadModalState.movieTitle,
        downloadModalState.tmdbId
      );
    }

    async function openDownloadModal(pageUrl, title, tmdbId) {
      downloadModalTitle.textContent = title || "Download options";
      downloadModalContent.className = "download-state";
      downloadModalContent.textContent = "Loading download options…";
      downloadModal.hidden = false;

      try {
        const res = await fetch(apiUrl(`downloads?url=${encodeURIComponent(pageUrl)}`));
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);

        if (!data.options?.length) {
          downloadModalContent.className = "download-state";
          downloadModalContent.innerHTML = `
            <p>No download links found on this page.</p>
            ${renderSelectorDebug(data.selectors)}
            <a class="download-option" href="${escapeAttr(pageUrl)}" target="_blank" rel="noopener noreferrer">Open source page</a>
          `;
          return;
        }

        downloadModalState = {
          title: title || "Download options",
          options: data.options,
          movieTitle: title || "",
          tmdbId: tmdbId || null,
        };
        downloadModalContent.innerHTML = renderQualityOptions(data.options);
      } catch (err) {
        downloadModalContent.className = "download-state";
        downloadModalContent.textContent = err.message;
      }
    }

    function setupSourceConfig(config) {
      if (!config?.configEditable) {
        sourceConfigEl.hidden = true;
        return;
      }

      sourceConfigEl.hidden = false;
      mainUrlInput.value = config.mainUrl || "";
    }

    async function applyMainUrl() {
      const nextUrl = mainUrlInput.value.trim();
      if (!nextUrl) return;

      applyMainUrlBtn.disabled = true;
      applyMainUrlBtn.textContent = "Saving…";

      try {
        const res = await fetch(apiUrl("config"), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mainUrl: nextUrl }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);

        await load();
      } catch (err) {
        content.className = "state error";
        content.textContent = err.message;
      } finally {
        applyMainUrlBtn.disabled = false;
        applyMainUrlBtn.textContent = "Apply";
      }
    }

    async function load({ refresh = false } = {}) {
      const gen = ++loadGeneration;
      refreshBtn.disabled = true;
      allMovies = [];
      nextSourceOrder = 0;
      activePresets.clear();
      loadedThroughPage = 0;
      filtersEl.hidden = true;
      content.className = "state";
      content.textContent = "Loading movies…";

      try {
        const configRes = await fetch(apiUrl("config"));
        const config = await configRes.json();
        if (!configRes.ok) throw new Error("Failed to load config");

        totalMaxPages = config.maxPages;
        initialPagesCount = config.initialPages || 2;
        setupSourceConfig(config);

        const loadAllFromCache = config.cacheEnabled && !refresh;
        const toPage = loadAllFromCache
          ? totalMaxPages
          : Math.min(initialPagesCount, totalMaxPages);

        if (loadAllFromCache) {
          content.textContent = "Loading library from cache…";
        } else if (refresh) {
          content.textContent = "Refreshing from source…";
        }

        const data = await fetchPageRange(1, toPage, { refresh });
        if (gen !== loadGeneration) return;

        mergeMovies(data.movies || []);
        loadedThroughPage = data.to;
        tmdbEnabledFlag = data.tmdbEnabled;
        filtersEl.hidden = allMovies.length === 0;
        populateFilterOptions(allMovies);
        await refreshDownloadLibrary();
        await refreshDownloadJobs({ rerender: false });
        applyFiltersAndRender();
        refreshBtn.disabled = false;

        if (!loadAllFromCache && loadedThroughPage < totalMaxPages) {
          loadRemainingPages(gen, loadedThroughPage + 1, totalMaxPages, { refresh });
        }
      } catch (err) {
        content.className = "state error";
        content.textContent = err.message;
        refreshBtn.disabled = false;
      }
    }

    refreshBtn.addEventListener("click", () => load({ refresh: true }));
    applyMainUrlBtn.addEventListener("click", applyMainUrl);
    mainUrlInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") applyMainUrl();
    });

    content.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-download-link]");
      if (!btn) return;
      e.preventDefault();
      openDownloadModal(btn.dataset.downloadLink, btn.dataset.downloadTitle, btn.dataset.tmdbId || null);
    });

    document.getElementById("download-modal-close").addEventListener("click", closeDownloadModal);
    downloadModal.addEventListener("click", (e) => {
      if (e.target === downloadModal) closeDownloadModal();
    });

    downloadModalContent.addEventListener("click", async (e) => {
      const picker = e.target.closest(".download-picker");
      if (picker) {
        e.preventDefault();
        try {
          await loadDirectDownloads(picker.dataset.url, picker.dataset.label);
        } catch (err) {
          downloadModalContent.className = "download-state";
          downloadModalContent.textContent = err.message;
        }
        return;
      }

      const serverBtn = e.target.closest(".server-download");
      if (serverBtn) {
        e.preventDefault();
        try {
          await startServerDownload(serverBtn);
        } catch (err) {
          serverBtn.disabled = false;
          serverBtn.classList.add("failed");
          serverBtn.textContent = `${serverBtn.dataset.label} — ${err.message}`;
        }
        return;
      }

      const backBtn = e.target.closest(".download-back");
      if (backBtn) {
        e.preventDefault();
        downloadModalContent.innerHTML = renderQualityOptions(downloadModalState.options);
      }
    });

    [searchInput, sortSelect, typeFilter, genreFilter, yearFilter, qualityFilter].forEach((el) => {
      el.addEventListener("input", applyFiltersAndRender);
      el.addEventListener("change", applyFiltersAndRender);
    });

    document.querySelectorAll(".chip[data-preset]").forEach((chip) => {
      chip.addEventListener("click", () => togglePreset(chip.dataset.preset));
    });

    load();
  </script>
</body>
</html>
